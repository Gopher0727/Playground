# 网站名称，显示在浏览器标签页和导航栏
site_name: My Playground

# 导航栏：定义站点页面结构
# 有子项的标题配合 navigation.indexes + section-index 插件可点击
# 第一个无标签的子项（如 posts/linux/index.md）会被合并为父级页面
nav:
  - Home: index.md
  - Linux:
    - posts/linux/index.md
    - eBPF: posts/linux/eBPF.md
    - uring: posts/linux/uring.md
  - Programming language:
    - posts/programming language/index.md
    - Comparison: posts/programming language/comparison.md
    - Golang: posts/programming language/golang.md
  - Frontend:
    - posts/frontend/index.md
    - CSS:
      - posts/frontend/css/index.md
      - Pseudo Elements: posts/frontend/css/pseudo elements.md
      - Animation & Transition: posts/frontend/css/animation & transition.md
  - Resources: posts/resources.md
  - Test:
    - posts/test/index.md
    - Markdown Editor: posts/test/editor.md
    - CSS Test: posts/test/test.html
    - AI Learn（Generated by AI）: posts/test/AI/learn.md

# 主题配置
theme:
  name: material # 使用 Material for MkDocs 主题
  features: # 主题特性开关
    - navigation.indexes # 让有 index.md 的导航父标题可点击
    - toc.follow          # 滚动时右侧目录自动高亮当前标题
  # icon:
  #   logo:
  #   repo:
  # 网站语言
  language: en # zh
  # 配色方案
  palette:
    scheme: default      # 默认主题：default/light | dark | slate
    primary: deep purple # 主色调
    accent: amber        # 强调色（链接、按钮等）
  # 字体设置
  font: Fira Code Nerd Font # \n text: Noto Sans SC \n code: Fira Code Nerd Font

# MkDocs 插件
plugins:
  - search        # 内置搜索插件（显式声明 plugins 后必须手动包含）
  - section-index # 让有子项的导航标题变为可点击的 section 页面

# 额外配置
extra:
  generator: false # 隐藏 "Generated by MkDocs" 标识

# Markdown 扩展
markdown_extensions:
  - pymdownx.arithmatex: # 数学公式渲染（配合 MathJax）
      generic: true

# 额外引入的 JavaScript 文件（按顺序加载）
extra_javascript:
  - scripts/copyright.js                                        # 页脚版权信息
  - scripts/editor.js                                           # Vditor 编辑器初始化
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js # 数学公式渲染

# 额外引入的 CSS 文件
extra_css:
  - styles/copyright.css   # 页脚样式
  - styles/card.css        # 卡片样式（圆角、阴影、悬停浮动）
  - styles/vditor.css      # Vditor 编辑器样式
  - styles/layout.css      # 页面布局（内容区宽度等）
